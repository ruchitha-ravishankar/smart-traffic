name: Traffic Simulator

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wake up Render
        run: |
          curl -s https://smart-traffic-api-lkis.onrender.com/ || true
          sleep 60
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests
      - name: Run simulator
        run: python sensor_simulator.py
        timeout-minutes: 3
        env:
          API_URL: https://smart-traffic-api-lkis.onrender.com
